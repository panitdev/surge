name: Publish @panitdev/surge-client

on:
  push:
    tags:
      - "surge-client-v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package version
        working-directory: packages/surge-client
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#surge-client-v}"

          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag surge-client-v$TAG does not match package version $VERSION"
            exit 1
          fi

      - name: Run tests
        run: bun test
        working-directory: packages/surge-client

      - name: Build
        run: bun run build
        working-directory: packages/surge-client

      - name: Verify npm package contents
        working-directory: packages/surge-client
        run: npm pack --dry-run

      - name: Publish to npm
        working-directory: packages/surge-client
        run: npm publish
