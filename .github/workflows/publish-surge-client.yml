name: Publish @panit/surge-client

on:
  push:
    tags:
      - "surge-client-v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate package version
        working-directory: packages/surge-client
        run: |
          VERSION=$(node -p "require('./jsr.json').version")
          TAG="${GITHUB_REF_NAME#surge-client-v}"

          if [ "$VERSION" != "$TAG" ]; then
            echo "Tag surge-client-v$TAG does not match jsr.json version $VERSION"
            exit 1
          fi

      - name: Run tests
        run: bun test
        working-directory: packages/surge-client

      - name: Publish to JSR
        working-directory: packages/surge-client
        run: npx jsr publish
